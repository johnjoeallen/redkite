services:
  red-kite:
    build:
      context: .
    ports:
      - "6502:6502"
    volumes:
      - redkite-data:/app/data
    command:
      - java
      - -cp
      - /app/classes:/app/lib/h2.jar
      - -Dredkite.db.url=jdbc:h2:./data/redkite;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
      - -Dredkite.db.user=sa
      - -Dredkite.db.password=
      - -Dredkite.port=6502
      - com.redkite.server.RedKiteServerMain

volumes:
  redkite-data:
