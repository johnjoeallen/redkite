services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: redkite
      POSTGRES_USER: redkite
      POSTGRES_PASSWORD: redkite
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redkite -d redkite"]
      interval: 5s
      timeout: 5s
      retries: 20

  red-kite:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6502:6502"
    environment:
      REDKITE_DB_URL: jdbc:postgresql://postgres:5432/redkite
      REDKITE_DB_USER: redkite
      REDKITE_DB_PASSWORD: redkite
    command: ["sh", "-c", "java -cp /app/classes:/app/lib/postgresql.jar -Dredkite.db.url=jdbc:postgresql://postgres:5432/redkite -Dredkite.db.user=redkite -Dredkite.db.password=redkite -Dredkite.port=6502 com.redkite.server.RedKiteServerMain"]
